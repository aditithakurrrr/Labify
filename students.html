<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students — Labify</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚗️</text></svg>">
</head>
<body>
<div class="sidebar-overlay"></div>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">⚗️</div><div class="logo-text">Lab<span>ify</span></div></div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <button class="collapse-btn" id="collapseBtn"><span class="collapse-icon nav-icon">◀</span><span class="nav-label">Collapse</span></button>
    </div>
  </aside>
  <div class="main-content" id="mainContent">
    <header class="navbar">
      <button class="icon-btn" id="mobileMenuBtn">☰</button>
      <div class="page-title-area">
        <div class="page-breadcrumb" id="pageBreadcrumb">Labify / People</div>
        <div class="page-heading" id="pageHeading">Students</div>
      </div>
      <div class="navbar-search"><span class="search-icon">🔍</span><input type="text" id="globalSearch" placeholder="Search..." autocomplete="off"></div>
      <div class="navbar-actions">
        <button class="icon-btn" id="themeToggle">☀️</button>
        <div style="position:relative">
          <div class="avatar" id="avatarBtn">AD</div>
          <div class="profile-dropdown" id="profileDropdown">
            <div class="dropdown-item">👤 Admin Profile</div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item">🚪 Sign Out</div>
          </div>
        </div>
      </div>
    </header>
    <main class="page-content">
      <div class="mini-stats" id="miniStats"></div>
      <div class="table-card">
        <div class="table-toolbar">
          <div class="search-box"><span>🔍</span><input type="text" id="tableSearch" placeholder="Search students..."></div>
          <select class="filter-select" id="deptFilter">
            <option value="">All Departments</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Electronics">Electronics</option>
            <option value="Mechanical">Mechanical</option>
            <option value="Biotechnology">Biotechnology</option>
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
          </select>
          <select class="filter-select" id="statusFilter">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
          <div class="toolbar-spacer"></div>
          <button class="btn btn-primary" onclick="openAddModal()">➕ Add Student</button>
        </div>
        <div id="tableBody"></div>
      </div>
    </main>
  </div>
</div>

<div class="modal-overlay" id="studentModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Student</div>
      <button class="modal-close" onclick="closeModal('studentModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="fName" placeholder="e.g. Arjun Kumar">
          <div class="form-error" id="fNameErr">Name is required</div>
        </div>
        <div class="form-group">
          <label>Roll Number *</label>
          <input type="text" id="fRoll" placeholder="e.g. 2023CS001">
          <div class="form-error" id="fRollErr">Roll number is required</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Department</label>
          <select id="fDept">
            <option value="Computer Science">Computer Science</option>
            <option value="Electronics">Electronics</option>
            <option value="Mechanical">Mechanical</option>
            <option value="Biotechnology">Biotechnology</option>
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
          </select>
        </div>
        <div class="form-group">
          <label>Year of Study</label>
          <select id="fYear">
            <option value="1st">1st Year</option>
            <option value="2nd">2nd Year</option>
            <option value="3rd">3rd Year</option>
            <option value="4th">4th Year</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="fEmail" placeholder="e.g. student@college.edu">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="fPhone" placeholder="e.g. +91 9001234567">
        </div>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="fStatus">
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('studentModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveStudent()">💾 Save Student</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title" id="confirmTitle">Delete Student?</div>
    <div class="confirm-msg" id="confirmMsg">This will permanently remove this student record.</div>
    <div class="confirm-actions">
      <button class="btn btn-secondary" onclick="Confirm.cancel()">Cancel</button>
      <button class="btn btn-danger" id="confirmBtn" onclick="Confirm.confirm()">Delete</button>
    </div>
  </div>
</div>
<script src="script.js"></script>
<script>
let allStudents = [], filtered = [];
const deptColors = { 'Computer Science':'#4f8ef7','Electronics':'#7c3aed','Mechanical':'#f59e0b','Biotechnology':'#10b981','Physics':'#06b6d4','Chemistry':'#ef4444' };

document.addEventListener('DOMContentLoaded', () => {
  initLayout('students.html', 'Students', 'LabEMS / People');
  loadData();
  document.getElementById('tableSearch').addEventListener('input', Utils.debounce(applyFilters, 250));
  document.getElementById('deptFilter').addEventListener('change', applyFilters);
  document.getElementById('statusFilter').addEventListener('change', applyFilters);
});

function loadData() {
  allStudents = DB.get('students');
  renderMiniStats();
  applyFilters();
}

function renderMiniStats() {
  const active = allStudents.filter(s => s.status === 'active').length;
  const depts = [...new Set(allStudents.map(s => s.department))].length;
  document.getElementById('miniStats').innerHTML = `
    <div class="mini-stat"><div class="mini-stat-value text-accent">${allStudents.length}</div><div class="mini-stat-label">Total Students</div></div>
    <div class="mini-stat"><div class="mini-stat-value text-success">${active}</div><div class="mini-stat-label">Active Students</div></div>
    <div class="mini-stat"><div class="mini-stat-value text-warning">${allStudents.length - active}</div><div class="mini-stat-label">Inactive</div></div>
    <div class="mini-stat"><div class="mini-stat-value" style="color:var(--accent-teal)">${depts}</div><div class="mini-stat-label">Departments</div></div>
  `;
}

function applyFilters() {
  const q = document.getElementById('tableSearch').value.toLowerCase();
  const dept = document.getElementById('deptFilter').value;
  const status = document.getElementById('statusFilter').value;
  filtered = allStudents.filter(s => {
    const matchQ = !q || s.name.toLowerCase().includes(q) || s.roll.toLowerCase().includes(q) || (s.email||'').toLowerCase().includes(q);
    const matchD = !dept || s.department === dept;
    const matchS = !status || s.status === status;
    return matchQ && matchD && matchS;
  });
  renderTable();
}

function renderTable() {
  const container = document.getElementById('tableBody');
  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🎓</div><div class="empty-title">No students found</div><div class="empty-desc">Add student records to manage equipment borrowing.</div><button class="btn btn-primary" onclick="openAddModal()">➕ Add Student</button></div>`;
    return;
  }
  container.innerHTML = `
    <table>
      <thead><tr><th>#</th><th>Student</th><th>Roll No.</th><th>Department</th><th>Year</th><th>Email</th><th>Phone</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        ${filtered.map((s, i) => {
          const color = deptColors[s.department] || '#94a3b8';
          return `<tr>
            <td style="color:var(--text-muted);font-size:12px">${i+1}</td>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,${color},${color}88);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff">${Utils.getInitials(s.name)}</div>
                <div><div style="font-weight:600">${s.name}</div></div>
              </div>
            </td>
            <td><code style="background:var(--bg-input);padding:3px 8px;border-radius:6px;font-size:12px">${s.roll}</code></td>
            <td><span style="background:${color}22;color:${color};padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600">${s.department}</span></td>
            <td style="font-size:13px">${s.year || '—'}</td>
            <td style="font-size:13px;color:var(--accent-primary)">${s.email || '—'}</td>
            <td style="font-size:13px">${s.phone || '—'}</td>
            <td>${Utils.statusBadge(s.status)}</td>
            <td>
              <div class="action-btns">
                <button class="btn btn-secondary btn-sm btn-icon-only" onclick="editStudent(${s.id})" title="Edit">✏️</button>
                <button class="btn btn-danger btn-sm btn-icon-only" onclick="deleteStudent(${s.id})" title="Delete">🗑️</button>
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function openAddModal() {
  document.getElementById('editId').value = '';
  ['fName','fRoll','fEmail','fPhone'].forEach(f => document.getElementById(f).value = '');
  document.getElementById('fDept').value = 'Computer Science';
  document.getElementById('fYear').value = '1st';
  document.getElementById('fStatus').value = 'active';
  document.getElementById('modalTitle').textContent = 'Add Student';
  clearErrors();
  openModal('studentModal');
}

function editStudent(id) {
  const s = allStudents.find(x => x.id === id);
  if (!s) return;
  document.getElementById('editId').value = id;
  document.getElementById('fName').value = s.name;
  document.getElementById('fRoll').value = s.roll;
  document.getElementById('fDept').value = s.department;
  document.getElementById('fYear').value = s.year || '1st';
  document.getElementById('fEmail').value = s.email || '';
  document.getElementById('fPhone').value = s.phone || '';
  document.getElementById('fStatus').value = s.status;
  document.getElementById('modalTitle').textContent = 'Edit Student';
  clearErrors();
  openModal('studentModal');
}

function saveStudent() {
  const name = document.getElementById('fName').value.trim();
  const roll = document.getElementById('fRoll').value.trim();
  let valid = true;
  if (!name) { showError('fNameErr'); document.getElementById('fName').classList.add('invalid'); valid = false; }
  else { hideError('fNameErr'); document.getElementById('fName').classList.remove('invalid'); }
  if (!roll) { showError('fRollErr'); document.getElementById('fRoll').classList.add('invalid'); valid = false; }
  else { hideError('fRollErr'); document.getElementById('fRoll').classList.remove('invalid'); }
  if (!valid) return;

  const data = {
    name, roll,
    department: document.getElementById('fDept').value,
    year: document.getElementById('fYear').value,
    email: document.getElementById('fEmail').value.trim(),
    phone: document.getElementById('fPhone').value.trim(),
    status: document.getElementById('fStatus').value
  };

  const students = DB.get('students');
  const id = document.getElementById('editId').value;
  if (id) {
    const idx = students.findIndex(s => s.id === parseInt(id));
    if (idx >= 0) students[idx] = { ...students[idx], ...data };
    Toast.show('Student updated!', 'success');
  } else {
    data.id = DB.nextId('students');
    students.push(data);
    Toast.show('Student added!', 'success');
  }
  DB.set('students', students);
  closeModal('studentModal');
  loadData();
}

async function deleteStudent(id) {
  const ok = await Confirm.show('Delete Student?', 'This will permanently remove this student record.');
  if (!ok) return;
  DB.set('students', DB.get('students').filter(s => s.id !== id));
  Toast.show('Student deleted.', 'warning');
  loadData();
}

function showError(id) { document.getElementById(id)?.classList.add('show'); }
function hideError(id) { document.getElementById(id)?.classList.remove('show'); }
function clearErrors() {
  document.querySelectorAll('.form-error').forEach(e => e.classList.remove('show'));
  document.querySelectorAll('.invalid').forEach(e => e.classList.remove('invalid'));
}
</script>
</body>
</html>
