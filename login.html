<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Labify — Lab Equipment Management System Login" />
  <title>Labify · Sign In</title>

  <!-- Fonts loaded via CSS @import -->
  <link rel="stylesheet" href="login.css" />

  <!--
    auth.js MUST be loaded before login.js so redirectIfAuthenticated()
    and saveSession() are available when login.js executes.
  -->
  <script src="auth.js"></script>
</head>
<body>

  <!-- ── Ambient background layer ─────────────────────────────── -->
  <div class="bg-layer" aria-hidden="true">
    <div class="orb orb--a"></div>
    <div class="orb orb--b"></div>
  </div>

  <!-- ── Theme toggle ──────────────────────────────────────────── -->
  <button
    id="theme-toggle"
    class="theme-toggle"
    aria-label="Switch to light theme"
  >
    <span class="theme-icon">☀️</span>
    <span>Theme</span>
  </button>

  <!-- ── Login card ─────────────────────────────────────────────── -->
  <main class="login-wrapper" role="main">
    <div class="login-card">

      <!-- Brand -->
      <header class="brand">
        <div class="brand-logo" aria-hidden="true">
          <!-- Beaker / flask icon -->
          <svg viewBox="0 0 24 24">
            <path d="M9 3h6M9 3v8L4.5 18.5A2 2 0 006.3 21h11.4a2 2 0 001.8-2.5L15 11V3"/>
            <circle cx="9.5" cy="16.5" r="1" fill="currentColor" stroke="none" style="fill:#fff"/>
            <circle cx="13"  cy="14"   r="0.7" fill="currentColor" stroke="none" style="fill:#fff"/>
          </svg>
        </div>
        <h1 class="brand-name">Labi<span>fy</span></h1>
        <p class="brand-tagline">Lab Equipment Management</p>
      </header>

      <!-- Inline error display -->
      <div
        id="error-message"
        class="error-message"
        aria-live="assertive"
        aria-atomic="true"
      >
        <!-- Alert icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="error-text"></span>
      </div>

      <!-- Login form -->
      <form id="login-form" novalidate autocomplete="on">

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-wrap">
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="you@institution.edu"
              autocomplete="email"
              required
              aria-describedby="email-hint"
            />
            <span class="input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <polyline points="2,4 12,13 22,4"/>
              </svg>
            </span>
          </div>
          <span id="email-hint" class="field-hint" role="alert"></span>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
              aria-describedby="password-hint"
            />
            <span class="input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
            </span>
          </div>
          <span id="password-hint" class="field-hint" role="alert"></span>
        </div>

        <!-- Role -->
        <div class="form-group">
          <label class="form-label" for="role">Role</label>
          <div class="input-wrap select-wrap">
            <select
              id="role"
              name="role"
              class="form-select"
              required
              aria-describedby="role-hint"
            >
              <option value="" disabled selected>Select your role</option>
              <option value="Student">Student</option>
              <option value="Faculty">Faculty</option>
              <option value="Technician">Technician</option>
            </select>
            <span class="input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="8"  r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
            </span>
            <span class="select-chevron" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </span>
          </div>
          <span id="role-hint" class="field-hint" role="alert"></span>
        </div>

        <!-- Submit -->
        <button type="submit" id="submit-btn" class="btn-submit">
          <span id="btn-spinner" class="btn-spinner" aria-hidden="true"></span>
          <span id="btn-text">Sign In</span>
        </button>

      </form>

      <!-- Footer -->
      <footer class="card-footer">
        <p class="footer-text">
          Having trouble? Contact your
          <a href="mailto:labadmin@institution.edu">lab administrator</a>.
        </p>
      </footer>

    </div><!-- /.login-card -->
  </main>

  <script src="login.js"></script>
</body>
</html>
