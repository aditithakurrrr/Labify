<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendors — Labify</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚗️</text></svg>">
</head>
<body>
<div class="sidebar-overlay"></div>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">⚗️</div><div class="logo-text">Lab<span>ify</span></div></div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <button class="collapse-btn" id="collapseBtn"><span class="collapse-icon nav-icon">◀</span><span class="nav-label">Collapse</span></button>
    </div>
  </aside>
  <div class="main-content" id="mainContent">
    <header class="navbar">
      <button class="icon-btn" id="mobileMenuBtn">☰</button>
      <div class="page-title-area">
        <div class="page-breadcrumb" id="pageBreadcrumb">Labify / Resources</div>
        <div class="page-heading" id="pageHeading">Vendors</div>
      </div>
      <div class="navbar-search"><span class="search-icon">🔍</span><input type="text" id="globalSearch" placeholder="Search..." autocomplete="off"></div>
      <div class="navbar-actions">
        <button class="icon-btn" id="themeToggle">☀️</button>
        <div style="position:relative">
          <div class="avatar" id="avatarBtn">AD</div>
          <div class="profile-dropdown" id="profileDropdown">
            <div class="dropdown-item">👤 Admin Profile</div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item">🚪 Sign Out</div>
          </div>
        </div>
      </div>
    </header>
    <main class="page-content">
      <div class="mini-stats" id="miniStats"></div>
      <div class="table-card">
        <div class="table-toolbar">
          <div class="search-box"><span>🔍</span><input type="text" id="tableSearch" placeholder="Search vendors..."></div>
          <select class="filter-select" id="statusFilter">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
          <div class="toolbar-spacer"></div>
          <button class="btn btn-primary" onclick="openAddModal()">➕ Add Vendor</button>
        </div>
        <div id="tableBody"></div>
      </div>
    </main>
  </div>
</div>

<div class="modal-overlay" id="vendorModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Vendor</div>
      <button class="modal-close" onclick="closeModal('vendorModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group">
          <label>Company Name *</label>
          <input type="text" id="fName" placeholder="e.g. TechSupply Co.">
          <div class="form-error" id="fNameErr">Name is required</div>
        </div>
        <div class="form-group">
          <label>Contact Person</label>
          <input type="text" id="fContact" placeholder="e.g. John Smith">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="fEmail" placeholder="e.g. vendor@email.com">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="fPhone" placeholder="e.g. +91 9876543210">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select id="fCategory">
            <option value="Electronics">Electronics</option>
            <option value="Lab Instruments">Lab Instruments</option>
            <option value="Biology">Biology</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Physics">Physics</option>
            <option value="General">General</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="fStatus">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('vendorModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveVendor()">💾 Save Vendor</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title" id="confirmTitle">Delete Vendor?</div>
    <div class="confirm-msg" id="confirmMsg">This will remove the vendor record permanently.</div>
    <div class="confirm-actions">
      <button class="btn btn-secondary" onclick="Confirm.cancel()">Cancel</button>
      <button class="btn btn-danger" id="confirmBtn" onclick="Confirm.confirm()">Delete</button>
    </div>
  </div>
</div>
<script src="script.js"></script>
<script>
let allVendors = [], filtered = [];

document.addEventListener('DOMContentLoaded', () => {
  initLayout('vendors.html', 'Vendors', 'Labify / Resources');
  loadData();
  document.getElementById('tableSearch').addEventListener('input', Utils.debounce(applyFilters, 250));
  document.getElementById('statusFilter').addEventListener('change', applyFilters);
});

function loadData() {
  allVendors = DB.get('vendors');
  renderMiniStats();
  applyFilters();
}

function renderMiniStats() {
  const active = allVendors.filter(v => v.status === 'active').length;
  const totalItems = allVendors.reduce((s, v) => s + (v.items_supplied || 0), 0);
  document.getElementById('miniStats').innerHTML = `
    <div class="mini-stat"><div class="mini-stat-value text-accent">${allVendors.length}</div><div class="mini-stat-label">Total Vendors</div></div>
    <div class="mini-stat"><div class="mini-stat-value text-success">${active}</div><div class="mini-stat-label">Active Vendors</div></div>
    <div class="mini-stat"><div class="mini-stat-value text-danger">${allVendors.length - active}</div><div class="mini-stat-label">Inactive</div></div>
    <div class="mini-stat"><div class="mini-stat-value" style="color:var(--accent-teal)">${totalItems}</div><div class="mini-stat-label">Total Items Supplied</div></div>
  `;
}

function applyFilters() {
  const q = document.getElementById('tableSearch').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  filtered = allVendors.filter(v => {
    const matchQ = !q || v.name.toLowerCase().includes(q) || (v.contact || '').toLowerCase().includes(q) || (v.email || '').toLowerCase().includes(q);
    const matchS = !status || v.status === status;
    return matchQ && matchS;
  });
  renderTable();
}

const catColors = { Electronics:'#4f8ef7', 'Lab Instruments':'#7c3aed', Biology:'#10b981', Chemistry:'#f59e0b', Physics:'#06b6d4', General:'#94a3b8' };

function renderTable() {
  const container = document.getElementById('tableBody');
  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🏢</div><div class="empty-title">No vendors found</div><div class="empty-desc">Add vendor records to track suppliers.</div><button class="btn btn-primary" onclick="openAddModal()">➕ Add Vendor</button></div>`;
    return;
  }
  container.innerHTML = `
    <table>
      <thead><tr><th>#</th><th>Company</th><th>Contact Person</th><th>Email</th><th>Phone</th><th>Category</th><th>Items Supplied</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        ${filtered.map((v, i) => `
          <tr>
            <td style="color:var(--text-muted);font-size:12px">${i+1}</td>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,${catColors[v.category]||'#4f8ef7'},${catColors[v.category]||'#7c3aed'}44);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff">${Utils.getInitials(v.name)}</div>
                <div><div style="font-weight:600">${v.name}</div></div>
              </div>
            </td>
            <td>${v.contact || '—'}</td>
            <td style="font-size:13px;color:var(--accent-primary)">${v.email || '—'}</td>
            <td style="font-size:13px">${v.phone || '—'}</td>
            <td><span style="background:${catColors[v.category]||'#94a3b8'}22;color:${catColors[v.category]||'#94a3b8'};padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600">${v.category}</span></td>
            <td><span style="font-weight:700;color:var(--accent-primary)">${v.items_supplied || 0}</span></td>
            <td>${Utils.statusBadge(v.status)}</td>
            <td>
              <div class="action-btns">
                <button class="btn btn-secondary btn-sm btn-icon-only" onclick="editVendor(${v.id})" title="Edit">✏️</button>
                <button class="btn btn-danger btn-sm btn-icon-only" onclick="deleteVendor(${v.id})" title="Delete">🗑️</button>
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

function openAddModal() {
  document.getElementById('editId').value = '';
  ['fName','fContact','fEmail','fPhone'].forEach(f => document.getElementById(f).value = '');
  document.getElementById('fCategory').value = 'Electronics';
  document.getElementById('fStatus').value = 'active';
  document.getElementById('modalTitle').textContent = 'Add Vendor';
  clearErrors();
  openModal('vendorModal');
}

function editVendor(id) {
  const v = allVendors.find(x => x.id === id);
  if (!v) return;
  document.getElementById('editId').value = id;
  document.getElementById('fName').value = v.name;
  document.getElementById('fContact').value = v.contact || '';
  document.getElementById('fEmail').value = v.email || '';
  document.getElementById('fPhone').value = v.phone || '';
  document.getElementById('fCategory').value = v.category;
  document.getElementById('fStatus').value = v.status;
  document.getElementById('modalTitle').textContent = 'Edit Vendor';
  clearErrors();
  openModal('vendorModal');
}

function saveVendor() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { showError('fNameErr'); document.getElementById('fName').classList.add('invalid'); return; }
  hideError('fNameErr'); document.getElementById('fName').classList.remove('invalid');

  const data = {
    name,
    contact: document.getElementById('fContact').value.trim(),
    email: document.getElementById('fEmail').value.trim(),
    phone: document.getElementById('fPhone').value.trim(),
    category: document.getElementById('fCategory').value,
    status: document.getElementById('fStatus').value,
    items_supplied: 0
  };

  const vendors = DB.get('vendors');
  const id = document.getElementById('editId').value;
  if (id) {
    const idx = vendors.findIndex(v => v.id === parseInt(id));
    if (idx >= 0) { data.items_supplied = vendors[idx].items_supplied || 0; vendors[idx] = { ...vendors[idx], ...data }; }
    Toast.show('Vendor updated!', 'success');
  } else {
    data.id = DB.nextId('vendors');
    vendors.push(data);
    Toast.show('Vendor added!', 'success');
  }
  DB.set('vendors', vendors);
  closeModal('vendorModal');
  loadData();
}

async function deleteVendor(id) {
  const ok = await Confirm.show('Delete Vendor?', 'This will permanently remove this vendor.');
  if (!ok) return;
  DB.set('vendors', DB.get('vendors').filter(v => v.id !== id));
  Toast.show('Vendor deleted.', 'warning');
  loadData();
}

function showError(id) { document.getElementById(id)?.classList.add('show'); }
function hideError(id) { document.getElementById(id)?.classList.remove('show'); }
function clearErrors() {
  document.querySelectorAll('.form-error').forEach(e => e.classList.remove('show'));
  document.querySelectorAll('.invalid').forEach(e => e.classList.remove('invalid'));
}
</script>
</body>
</html>
